<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle Locator | SimSam</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <link rel="stylesheet" href="styles/lp-style.css">
    <link rel="stylesheet" href="styles/calcu.css"> 
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">

    <header class="navbar">
        <div class="logo">SimSam</div>
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="guide.html">Panduan</a>
            <a href="calculator.html">Kalkulator</a>
            <a href="news.html">Berita</a>
        </nav>
    </header>

    <section id="search" class="py-4 py-md-5">
        <div class="container text-center px-3">
            <h2 class="fw-bold mb-2">Recycle Locator</h2>
            <p class="text-muted mb-4 small">Temukan titik pengumpulan sampah terdekat melalui peta interaktif</p>
            
            <div class="row g-3 justify-content-center mx-auto mb-4" style="max-width: 700px;">
                <div class="col-12 col-md-8">
                    <select id="provinceSelect" class="form-select border-0 shadow-sm py-3 px-4 rounded-4 w-100">
                        <option value="">Pilih Kota/Wilayah...</option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <button class="btn btn-success w-100 py-3 rounded-4 shadow-sm fw-bold" onclick="searchBankSampah()">
                        <i class="fas fa-search me-1"></i> Cari Titik
                    </button>
                </div>
            </div>

            <div id="mapContainer" class="shadow-sm rounded-4 overflow-hidden mb-4 d-none" style="height: 350px; border: 2px solid white; z-index: 1;"></div>

            <div id="searchResults" class="text-start mx-auto" style="max-width: 700px;"></div>
        </div>
    </section>

    <section class="py-5 bg-white border-top">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="card border-0 bg-light p-4 rounded-4 shadow-sm h-100">
                        <div class="d-flex align-items-center mb-4">
                            <div class="bg-success text-white p-3 rounded-3 me-3">
                                <i class="fas fa-calculator fs-4"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-0">Tabungan Rutin</h4>
                                <small class="text-muted">Estimasi pendapatan bulanan</small>
                            </div>
                        </div>
                        <div class="calc-inputs text-start d-flex flex-column gap-3 mb-4">
                            <div class="input-field">
                                <label class="fw-bold text-secondary mb-2 small">Jenis Sampah (Ketik/Pilih)</label>
                                <input type="text" id="manualWasteInput" class="form-control py-2 border-0 shadow-sm" placeholder="Misal: Botol plastik..." list="wasteSuggestions">
                                <datalist id="wasteSuggestions">
                                    <option value="Botol Plastik"><option value="Gelas Plastik"><option value="Koran Bekas"><option value="Kardus"><option value="Besi/Logam">
                                </datalist>
                            </div>
                            <div class="row g-2">
                                <div class="col-6"><label class="fw-bold text-secondary mb-2 small">Berat (kg)</label><input type="number" id="manualWeight" class="form-control py-2 border-0 shadow-sm" placeholder="0"></div>
                                <div class="col-6"><label class="fw-bold text-secondary mb-2 small">Kali/Minggu</label><input type="number" id="manualFreq" class="form-control py-2 border-0 shadow-sm" value="1"></div>
                            </div>
                        </div>
                        <button class="btn btn-success w-100 py-3 rounded-pill fw-bold" onclick="calculateSavings()">Hitung Potensi Tabungan</button>
                        <div id="manualCalcResult" class="mt-3 w-100" style="display: none;"></div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="card border-0 p-4 rounded-4 h-100 shadow-sm border-top border-success border-4">
                        <div class="d-flex align-items-center mb-4">
                            <div class="bg-success text-white p-3 rounded-3 me-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                <i class="fas fa-leaf fs-4"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-0">Analisis Dampak</h4>
                                <small class="text-muted">Estimasi dampak lingkungan & harga</small>
                            </div>
                        </div>
                        <form id="calculator-form" class="text-start d-flex flex-column h-100">
                            <div id="item-list" class="flex-grow-1">
                                <div class="row g-2 mb-2 item-row align-items-center">
                                    <div class="col-7"><input type="text" class="form-control item-type border-0 bg-light py-2" placeholder="Detail barang..." required></div>
                                    <div class="col-3"><input type="number" step="0.1" class="form-control item-weight border-0 bg-light py-2" placeholder="Kg" required></div>
                                    <div class="col-2 text-end"><button type="button" class="btn btn-sm text-muted remove-item-btn" disabled><i class="fas fa-times"></i></button></div>
                                </div>
                            </div>
                            <button type="button" id="add-item-btn" class="btn btn-sm btn-outline-secondary rounded-pill mt-2 mb-4"><i class="fas fa-plus me-1"></i> Tambah Item</button>
                            <button type="submit" id="submit-calc-btn" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">Analisis Dampak Lingkungan</button>
                        </form>
                        <div id="calculator-result" class="mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 SimSam | Sistem Informasi Manajemen Sampah</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="main.js"></script>
</body>
</html>
